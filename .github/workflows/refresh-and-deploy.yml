name: 刷新行情 & 部署

on:
  # 交易日9:30-15:00每30分钟刷新（UTC+8 = UTC 1:30-7:00）
  schedule:
    - cron: '*/30 1-7 * * 1-5'  # 周一到周五
  # 手动触发
  workflow_dispatch:
  # Push时部署
  push:
    branches: [main]

jobs:
  refresh-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 刷新行情数据
        env:
          MX_APIKEY: ${{ secrets.MX_APIKEY }}
        run: python3 refresh-data.py

      - name: 提交data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "📈 刷新行情 $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy . --project-name=invest-cake
